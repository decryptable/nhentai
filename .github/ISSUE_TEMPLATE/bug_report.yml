name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
assignees: ["decryptable"]

body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as possible. Incomplete reports may be closed.

  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "e.g. 0.1.0 or commit hash"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet that triggers the bug.
      render: python
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback / error output
      render: text
