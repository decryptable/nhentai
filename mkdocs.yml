site_name: nhentai
site_description: nhentai downloader with optional translation and PDF export
site_url: https://decryptable.github.io/nhentai
site_author: decryptable

repo_url: https://github.com/decryptable/nhentai
repo_name: decryptable/nhentai
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  extra_css:
    - css/mkdocstrings.css

plugins:
  - search
  - termynal:
      include_assets: true
      title: "nhentai"
      buttons: "macos"
      prompt_literal_start:
        - "$"
        - ">"
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: true
            show_signature_annotations: true
            show_symbol_type_heading: true
            show_attribute_values: true
            show_symbol_type_toc: true
            merge_init_into_class: true
            docstring_section_style: table
            docstring_style: sphinx
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Overview: api/index.md
      - NHentai: api/nhentai.md
      - Downloader: api/downloader.md
      - Translator: api/translator.md
      - Enums: api/enums.md
      - CDN: api/cdn.md
      - Grabber: api/grabber.md
      - Parser: api/parser.md
  - Changelog: changelog.md
